[build]
publish = "public"
command = "hugo --gc --minify -b ${DEPLOY_PRIME_URL}"

[build.environment]
HUGO_VERSION = "0.147.7"

[[plugins]]
package = "@netlify/plugin-sitemap"
  [plugins.inputs]
  buildDir = "public"
  baseUrl = "http://quintana-abogados.com"

[context.deploy-preview]
  command = "hugo --baseURL $DEPLOY_PRIME_URL"