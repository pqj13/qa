# Hugo configuration file
title: Abogados en Burgos | Quintana Abogados

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

defaultContentLanguage: es
languages:
  es:
    languageName: Español
    weight: 1
#  en:
#    languageName: English
#    weight: 2
#  fr:
#    languageName: Français
#    weight: 3


menu:
  main:
    - identifier: informacion
      name: Información
      pageRef: #
      weight: 1
    - identifier: servicios
      name: Servicios
      pageRef: /servicios
      weight: 2
    - identifier: contacto
      name: Contacto
      pageRef: #
      weight: 3
#    - name: About
#      pageRef: /about
#      weight: 2
#    - name: Contact ↗
#      url: "https://github.com/imfing"
#      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
