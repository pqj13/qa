# Hugo configuration file
title: Abogados en Burgos | Quintana Abogados

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

defaultContentLanguage: es
languages:
  es:
    languageName: Español
    weight: 1
  en:
    languageName: English
    weight: 2
  fr:
    languageName: Français
    weight: 3


menu:
  main:
    - identifier: abogados
      name: Abogados
      pageRef: /abogados
      weight: 1
    - identifier: servicios
      name: Servicios
      pageRef: /servicios
      weight: 2
    - identifier: contacto
      name: Contacto
      pageRef: /contacto
      weight: 3
      params:
        type: link
        icon: arrow-narrow-right

