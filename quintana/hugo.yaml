# Hugo configuration file
title: My Site

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

defaultContentLanguage: es
languages:
  es:
    languageName: Español
    weight: 1
  en:
    languageName: English
    weight: 2
  fr:
    languageName: Français
    weight: 3


menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Contact ↗
      url: "https://github.com/imfing"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
#    - name: GitHub
#      weight: 5
#      url: "https://github.com/imfing/hextra-starter-template"
#      params:
#        icon: github
#    - name: Twitter
#      weight: 6
#      url: "https://twitter.com/"
#      params:
#        icon: x-twitter

params:
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo.png
      dark: images/logo_oscuro.png
      link: /
      width: 187.5
      height: 56.25

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
